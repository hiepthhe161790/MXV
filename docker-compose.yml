version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mvx-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mvx-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/mvx?authSource=admin
      JWT_SECRET: your-secret-key-change-this
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mvx-client
    ports:
      - "5173:5173"
    environment:
      REACT_APP_API_URL: http://localhost:3000/api/v1
      REACT_APP_WS_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  mongodb_data:

networks:
  default:
    name: mvx-network
